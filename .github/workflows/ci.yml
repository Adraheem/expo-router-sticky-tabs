name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        # zustand + React 19 require legacy peer resolution.
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --ci

      - name: Build
        run: npm run build

  # Release is intentionally not enabled yet — semantic-release + changelog are
  # staged for a future iteration (see docs/DESIGN_DECISIONS.md#roadmap).
