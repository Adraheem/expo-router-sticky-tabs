name: Publish Package to npm

on:
  release:
    types: [published] # Triggers explicitly when a release is finalized

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish package to npm
        uses: JS-DevTools/npm-publish@v4
