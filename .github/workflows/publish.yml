name: Publish Package to npm

on:
  release:
    types: [published] # Triggers explicitly when a release is finalized

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org' # Sets up your .npmrc to target public npm

      - name: Install dependencies
        run: npm ci

      - name: Run build (if applicable)
        run: npm run build --if-present

      - name: Publish package to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Authenticates the terminal using your secret
